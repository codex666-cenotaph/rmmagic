services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rmm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rmm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rmm"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js"]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: rmm
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped

  server:
    image: ghcr.io/codex666-cenotaph/rmmagic/server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      RMM_DATABASE_URL: "postgres://rmm:${POSTGRES_PASSWORD}@postgres:5432/rmm?sslmode=disable"
      RMM_MASTER_KEY: ${RMM_MASTER_KEY}
      RMM_COOKIE_SECURE: ${RMM_COOKIE_SECURE:-true}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  web:
    image: ghcr.io/codex666-cenotaph/rmmagic/web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
