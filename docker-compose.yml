services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rmm
      POSTGRES_PASSWORD: rmm-dev-only
      POSTGRES_DB: rmm
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rmm"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "127.0.0.1:4222:4222"

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: rmm
      MINIO_ROOT_PASSWORD: rmm-dev-only
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - miniodata:/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:8025:8025"   # web UI
      - "127.0.0.1:1025:1025"   # SMTP

volumes:
  pgdata:
  miniodata:
