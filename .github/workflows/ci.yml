name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [server, agent, shared]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...
      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test -race ./...

  # The agent must keep cross-compiling for every endpoint OS (Windows agent
  # phase 1); vet runs per-GOOS so platform-tagged files are checked too.
  agent-cross-compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [windows, darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum
      - name: Build (GOOS=${{ matrix.goos }})
        working-directory: agent
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
        run: go build ./...
      - name: Vet (GOOS=${{ matrix.goos }})
        working-directory: agent
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
        run: go vet ./...

  # Build the Windows MSI package using WiX v4 on a real Windows runner.
  # Uploads rmmagent.exe and rmmagent.msi as build artifacts.
  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum
      - name: Build agent binary (windows/amd64)
        working-directory: agent
        env:
          CGO_ENABLED: "0"
        run: |
          New-Item -ItemType Directory -Force packaging/dist | Out-Null
          go build -ldflags="-s -w" -o packaging/dist/rmmagent-windows-amd64.exe ./cmd/rmmagent
      - name: Install WiX Toolset v4
        run: dotnet tool install --global wix --version "4.*"
      - name: Add WiX to PATH
        run: echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build MSI
        working-directory: agent/packaging
        run: wix build -d ProductVersion=0.0.0-dev -o dist/rmmagent-windows-amd64.msi rmmagent.wxs
      - uses: actions/upload-artifact@v4
        with:
          name: rmmagent-windows
          path: |
            agent/packaging/dist/rmmagent-windows-amd64.exe
            agent/packaging/dist/rmmagent-windows-amd64.msi

  # Run the Windows-tagged unit tests on a real Windows runner so the
  # registry/SCM helpers are exercised (build tags exclude them on Linux).
  agent-windows-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum
      - name: Test (windows/amd64)
        working-directory: agent
        run: go test ./internal/platform/...

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rmm
          POSTGRES_PASSWORD: rmm-ci
          POSTGRES_DB: rmm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rmm"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - name: Integration tests (RLS isolation probes, API + shell flows)
        working-directory: server
        env:
          RMM_TEST_DATABASE_URL: postgres://rmm:rmm-ci@localhost:5432/rmm?sslmode=disable
        run: go test ./internal/api/ -run Integration -v

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build dashboard
        working-directory: web
        run: |
          npm ci
          npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      # Full history so the gitleaks step can scan every commit, not a shallow clone.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: false
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          (cd server && govulncheck ./...)
          (cd agent && govulncheck ./...)
      # Scan the full history deterministically. gitleaks-action@v2 derives a
      # commit range from the event (<before>^..<head>); after force-pushes or
      # resets that base ref is unreachable, so it scanned 0 bytes and reported
      # a false "no leaks found" while exiting non-zero. A pinned, whole-repo
      # `detect` has no range dependency. (fetch-depth: 0 above gives full history.)
      - name: gitleaks (secret scan)
        run: |
          ver=8.24.3
          tmp=$(mktemp -d)
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" -o "$tmp/gitleaks.tar.gz"
          tar -xzf "$tmp/gitleaks.tar.gz" -C "$tmp" gitleaks
          "$tmp/gitleaks" detect --source . --redact -v --exit-code 2

  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Lint protos
        working-directory: proto
        run: buf lint

  docker:
    needs: [go, agent-cross-compile, integration, web, security, proto]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: server
            dockerfile: server/Dockerfile
            image: ghcr.io/codex666-cenotaph/rmmagic/server
          - name: web
            dockerfile: web/Dockerfile
            image: ghcr.io/codex666-cenotaph/rmmagic/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
