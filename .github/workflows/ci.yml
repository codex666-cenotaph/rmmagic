name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [server, agent, shared]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...
      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test -race ./...

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rmm
          POSTGRES_PASSWORD: rmm-ci
          POSTGRES_DB: rmm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rmm"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - name: Integration tests (RLS isolation probes, API flows)
        working-directory: server
        env:
          RMM_TEST_DATABASE_URL: postgres://rmm:rmm-ci@localhost:5432/rmm?sslmode=disable
        run: go test ./internal/api/ -run TestAPIIntegration -v

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build dashboard
        working-directory: web
        run: |
          npm ci
          npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: false
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          (cd server && govulncheck ./...)
          (cd agent && govulncheck ./...)
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Lint protos
        working-directory: proto
        run: buf lint
