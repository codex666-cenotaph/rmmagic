# Included at /etc/nginx/conf.d/default.conf (inside the http context), so
# the map directive below is valid here. $connection_upgrade is "upgrade"
# for WebSocket handshakes and "close" otherwise — required to proxy the
# agent gateway's persistent WebSocket.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Agent channel: enrollment, stats/inventory ingest, and the persistent
    # gateway WebSocket (/agent/v1/connect). nginx is the only published
    # ingress, so agents reach the server through here; without this block
    # they cannot enroll or connect at all.
    location /agent/ {
        proxy_pass http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep the long-lived gateway WebSocket open between heartbeats.
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Dashboard REST API.
    location /api/ {
        proxy_pass http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — serve index.html for all non-asset routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
